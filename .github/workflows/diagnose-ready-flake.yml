name: Diagnose server ready flake

on:
  push:
    branches:
      - codex/main-ntex-net-3.13-repro
  workflow_dispatch:
    inputs:
      client_iterations:
        description: ntex client after ServerStatus::Ready iterations
        required: false
        default: "5000"
      std_connect_iterations:
        description: std TcpStream after ServerStatus::Ready iterations
        required: false
        default: "5000"
      tokio_std_connect_iterations:
        description: std TcpStream after ServerStatus::Ready with ntex/tokio
        required: false
        default: "100"
      serial_std_connect_iterations:
        description: std TcpStream after ServerStatus::Ready with --test-threads=1
        required: false
        default: "500"
      single_std_connect_iterations:
        description: one std TcpStream test after ServerStatus::Ready
        required: false
        default: "500"
      extended_ready_iterations:
        description: extended 30s ready wait control iterations
        required: false
        default: "500"

concurrency:
  group: diagnose-ready-flake-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: full
  RUST_LOG_FILTER: ntex_rt=info,ntex_net::uring=trace,ntex_net::tokio=trace,ntex_io=trace,ntex_server=debug,ntex::client=trace,ntex::http=trace

jobs:
  stress:
    name: ubuntu-24.04 / rust 1.88 ready stress
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CLIENT_ITERS: ${{ github.event.inputs.client_iterations || '5000' }}
      STD_CONNECT_ITERS: ${{ github.event.inputs.std_connect_iterations || '5000' }}
      TOKIO_STD_CONNECT_ITERS: ${{ github.event.inputs.tokio_std_connect_iterations || '100' }}
      SERIAL_STD_CONNECT_ITERS: ${{ github.event.inputs.serial_std_connect_iterations || '500' }}
      SINGLE_STD_CONNECT_ITERS: ${{ github.event.inputs.single_std_connect_iterations || '500' }}
      EXTENDED_READY_ITERS: ${{ github.event.inputs.extended_ready_iterations || '500' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0-x86_64-unknown-linux-gnu

      - name: Environment
        run: |
          set -euo pipefail
          rustc --version --verbose
          cargo --version --verbose
          uname -a
          cat /proc/version
          printf 'nproc: '; nproc
          ulimit -a
          printf 'io_uring_disabled: '
          cat /proc/sys/kernel/io_uring_disabled 2>/dev/null || true
          printf 'io_uring_group: '
          cat /proc/sys/kernel/io_uring_group 2>/dev/null || true

      - name: Dependency graph
        run: |
          set -euo pipefail
          cargo tree -p ntex-server
          cargo tree -i ntex-server

      - name: Build diagnostic tests once
        run: |
          set -euo pipefail
          cargo test -p ntex --test ready_barrier_client --no-run --verbose
          cargo test -p ntex --test ready_barrier_std_connect --no-run --verbose
          cargo test -p ntex --features tokio --test ready_barrier_std_connect --no-run --verbose

      - name: Stress ntex client after ServerStatus::Ready
        id: client_ready
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$CLIENT_ITERS"); do
            log="ntex-ready-diagnostic-logs/client-ready-${i}.log"
            echo "::group::client ready iteration ${i}/${CLIENT_ITERS}"
            set +e
            timeout 120s env RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --test ready_barrier_client -- --nocapture \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=client-ready"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=cargo test -p ntex --test ready_barrier_client -- --nocapture"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-client-ready.env
              echo "::error::client ready failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - name: Stress std TcpStream after ServerStatus::Ready
        id: std_connect
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$STD_CONNECT_ITERS"); do
            log="ntex-ready-diagnostic-logs/std-connect-${i}.log"
            echo "::group::std connect iteration ${i}/${STD_CONNECT_ITERS}"
            set +e
            timeout 120s env RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --test ready_barrier_std_connect -- --nocapture \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=std-connect"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=cargo test -p ntex --test ready_barrier_std_connect -- --nocapture"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-std-connect.env
              echo "::error::std connect failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - name: Stress std TcpStream after ServerStatus::Ready, tokio
        id: std_connect_tokio
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$TOKIO_STD_CONNECT_ITERS"); do
            log="ntex-ready-diagnostic-logs/tokio-std-connect-${i}.log"
            echo "::group::tokio std connect iteration ${i}/${TOKIO_STD_CONNECT_ITERS}"
            set +e
            timeout 120s env RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --features tokio --test ready_barrier_std_connect -- --nocapture \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=tokio-std-connect"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=cargo test -p ntex --features tokio --test ready_barrier_std_connect -- --nocapture"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-tokio-std-connect.env
              echo "::error::tokio std connect failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - name: Stress std TcpStream after ServerStatus::Ready, serial test threads
        id: std_connect_serial
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$SERIAL_STD_CONNECT_ITERS"); do
            log="ntex-ready-diagnostic-logs/serial-std-connect-${i}.log"
            echo "::group::serial std connect iteration ${i}/${SERIAL_STD_CONNECT_ITERS}"
            set +e
            timeout 120s env RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --test ready_barrier_std_connect -- --nocapture --test-threads=1 \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=serial-std-connect"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=cargo test -p ntex --test ready_barrier_std_connect -- --nocapture --test-threads=1"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-serial-std-connect.env
              echo "::error::serial std connect failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - name: Stress one std TcpStream test after ServerStatus::Ready
        id: std_connect_single
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$SINGLE_STD_CONNECT_ITERS"); do
            log="ntex-ready-diagnostic-logs/single-std-connect-${i}.log"
            echo "::group::single std connect iteration ${i}/${SINGLE_STD_CONNECT_ITERS}"
            set +e
            timeout 120s env RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --test ready_barrier_std_connect ready_barrier_std_connect_00 -- --nocapture \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=single-std-connect"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=cargo test -p ntex --test ready_barrier_std_connect ready_barrier_std_connect_00 -- --nocapture"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-single-std-connect.env
              echo "::error::single std connect failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - name: Stress ntex client after ServerStatus::Ready, 30s ready wait
        id: client_ready_extended
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$EXTENDED_READY_ITERS"); do
            log="ntex-ready-diagnostic-logs/client-ready-extended-${i}.log"
            echo "::group::client ready extended iteration ${i}/${EXTENDED_READY_ITERS}"
            set +e
            timeout 180s env READY_TIMEOUT_SECS=30 RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --test ready_barrier_client -- --nocapture \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=client-ready-extended"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=READY_TIMEOUT_SECS=30 cargo test -p ntex --test ready_barrier_client -- --nocapture"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-client-ready-extended.env
              echo "::error::client ready extended failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - name: Stress std TcpStream after ServerStatus::Ready, 30s ready wait
        id: std_connect_extended
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p ntex-ready-diagnostic-logs
          for i in $(seq 1 "$EXTENDED_READY_ITERS"); do
            log="ntex-ready-diagnostic-logs/std-connect-extended-${i}.log"
            echo "::group::std connect extended iteration ${i}/${EXTENDED_READY_ITERS}"
            set +e
            timeout 180s env READY_TIMEOUT_SECS=30 RUST_LOG="$RUST_LOG_FILTER" \
              cargo test -p ntex --test ready_barrier_std_connect -- --nocapture \
              >"$log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "name=std-connect-extended"
                echo "iteration=${i}"
                echo "status=${status}"
                echo "command=READY_TIMEOUT_SECS=30 cargo test -p ntex --test ready_barrier_std_connect -- --nocapture"
                echo "rustc=$(rustc --version)"
                echo "kernel=$(uname -a)"
              } > ntex-ready-diagnostic-logs/failure-std-connect-extended.env
              echo "::error::std connect extended failed on iteration ${i} with status ${status}"
              tail -n 500 "$log"
              echo "::endgroup::"
              exit "$status"
            fi
            rm -f "$log"
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ntex-ready-diagnostic-logs
          path: ntex-ready-diagnostic-logs/
          if-no-files-found: ignore

      - name: Report diagnostic outcome
        if: always()
        run: |
          set -euo pipefail
          printf 'client ready outcome: %s\n' '${{ steps.client_ready.outcome }}'
          printf 'std connect outcome: %s\n' '${{ steps.std_connect.outcome }}'
          printf 'tokio std connect outcome: %s\n' '${{ steps.std_connect_tokio.outcome }}'
          printf 'serial std connect outcome: %s\n' '${{ steps.std_connect_serial.outcome }}'
          printf 'single std connect outcome: %s\n' '${{ steps.std_connect_single.outcome }}'
          printf 'client ready extended outcome: %s\n' '${{ steps.client_ready_extended.outcome }}'
          printf 'std connect extended outcome: %s\n' '${{ steps.std_connect_extended.outcome }}'
          test '${{ steps.client_ready.outcome }}' = success
          test '${{ steps.std_connect.outcome }}' = success
          test '${{ steps.std_connect_tokio.outcome }}' = success
          test '${{ steps.std_connect_serial.outcome }}' = success
          test '${{ steps.std_connect_single.outcome }}' = success
          test '${{ steps.client_ready_extended.outcome }}' = success
          test '${{ steps.std_connect_extended.outcome }}' = success
